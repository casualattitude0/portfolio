      - バックエンドエンジニア。Python（FastAPI）と Go でスケーラブルなサービスと API
        を構築。RESTful 設計、LLM/RAG パイプラインやベクトルデータベースの本番統合、Docker・Git・CI/CD（GCP）による配信自動化を得意とします。
    職務経歴:
