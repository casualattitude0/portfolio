        location: 台湾
        start_date: 2024-03
        end_date: present
        highlights:
          - "**Go** バックエンドを構築 — **OAuth** によるアカウント認証、リーダーボード、進捗同期を **REST API** として提供。"
          - "**Firestore / Cloud SQL** にデータを永続化し、**Docker** でコンテナ化、**GCP（Cloud
            Run / GKE）** にデプロイ。"
          - "**CI/CD パイプライン**（Fastlane + Git）でリリース準備時間を約 70% 短縮。コードレビューにも参加。"
      - company: 個人スタジオ
        position: 創業者／フルスタック開発者
        location: 台湾
        start_date: 2022-09
        end_date: 2024-03
        highlights:
          - バックエンドサービス・API・データ・クライアント連携までプロダクトを一気通貫で所有し、商用ソフトウェアを開発・リリース・運用。
    プロジェクト:
      - name: "A Slime — セルフホスト型 AI エージェント（RAG + LLM API）"
        date: 2026
        highlights:
          - "ツール実行エージェントを提供する **FastAPI** バックエンド：ドキュメント取り込み、**Chroma ベクトル DB**（LangChain）上の
            **RAG**、**WebSocket** チャット。"
          - "複数プロバイダの **LLM 推論ルーティング**（Gemini, Ollama, NVIDIA NIM）を単一インターフェースに抽象化。"
          - "技術: Python, FastAPI, LangChain, Chroma, WebSocket"
      - name: "ゲームサービス・バックエンド（GCP 上の Go）"
        date: 2024 – present
        highlights:
          - "アカウント・リーダーボード・ゲームデータ向けの **Go** REST API（**OAuth**）。**Docker**
            化し **Cloud Run / GKE** にデプロイ、**Firestore / Cloud SQL** に永続化。"
          - "技術: Go, GCP, Cloud Run, OAuth, Firestore, Docker"
      - name: "CI/CD 自動化パイプライン"
        date: 2025
        highlights:
          - "**Fastlane**・**GitHub Actions**・遠隔操作用の Discord ボットによるビルド／テスト／デプロイ自動化。リリース準備を約
            70% 高速化。"
          - "技術: Fastlane, GitHub Actions, Git, Docker"
